  identifier = "nav-hotness"
  name = "Hotness Tracker"
  url = "/hotness-tracker/"
  weight = 15

[[menu.main]]
  identifier = "nav-crowdfunding"
  name = "Crowdfunding"
  url = "/categories/crowdfunding/"
  weight = 30

[[menu.main]]
  identifier = "nav-digital"
  name = "Digital"
  url = "/categories/digital/"
  weight = 40

[[menu.main]]
  identifier = "nav-whattoplay"
  name = "What to Play?"
  url = "/what-to-play/"
  weight = 45

[[menu.main]]
